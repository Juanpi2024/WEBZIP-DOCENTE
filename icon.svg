<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Neon Indigo/Emerald Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Glowing Lightning Bolt Gradient -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>

    <!-- Drop Shadow Filter for Glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card Shape -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="8" />

  <!-- Inner Ambient Orb Glow -->
  <circle cx="256" cy="256" r="160" fill="#6366F1" opacity="0.15" filter="url(#neon-glow)" />
  <circle cx="256" cy="256" r="100" fill="#10B981" opacity="0.15" filter="url(#neon-glow)" />

  <!-- Glowing Premium Lightning Bolt (⚡) -->
  <path d="M288 32 L128 256 H240 L224 480 L384 256 H272 Z" fill="url(#bolt-grad)" filter="url(#neon-glow)" />
</svg>
